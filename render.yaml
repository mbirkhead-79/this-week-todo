databases:
  - name: thisweek-db
    plan: free
    databaseName: thisweek
    user: thisweek

services:
  - type: web
    name: this-week-todo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_URL
        fromDatabase:
          name: thisweek-db
          property: connectionURI
