<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="THIS WEEK">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>THIS WEEK</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Mobile header -->
        <header class="mobile-header">
            <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="mobile-title">THIS WEEK</span>
        </header>

        <!-- Sidebar overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>THIS WEEK</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/add-task" class="nav-item {% if page == 'add_task' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    <span>Add task</span>
                </a>
                <a href="/search" class="nav-item {% if page == 'search' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>Search</span>
                </a>
                <hr class="nav-divider">
                <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="/inbox" class="nav-item {% if page == 'inbox' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
                    </svg>
                    <span>Inbox</span>
                </a>
                <a href="/board" class="nav-item {% if page == 'board' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="3" width="6" height="12" rx="1"/><rect x="16" y="3" width="6" height="15" rx="1"/>
                    </svg>
                    <span>Board</span>
                </a>
                <a href="/today" class="nav-item {% if page == 'today' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        <text x="12" y="18" text-anchor="middle" font-size="8" fill="currentColor" stroke="none" font-weight="600">{{ today_day }}</text>
                    </svg>
                    <span>Today</span>
                </a>
                <a href="/upcoming" class="nav-item {% if page == 'upcoming' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        <line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/>
                    </svg>
                    <span>Upcoming</span>
                </a>
                <a href="/filters" class="nav-item {% if page == 'filters' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                    <span>Filters & Labels</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content {% if page == 'board' %}main-content-wide{% endif %}">
            {% block content %}{% endblock %}
        </main>

        <!-- Slide-out task detail panel -->
        <div class="panel-overlay" onclick="closePanel()"></div>
        <aside class="detail-panel" id="detail-panel">
            <div class="panel-header">
                <h3>Task Details</h3>
                <button class="panel-close" onclick="closePanel()">&times;</button>
            </div>
            <div class="panel-body" id="panel-body">
                <!-- Filled by JS -->
            </div>
        </aside>
    </div>

    <script>
        // Delete confirmation
        document.querySelectorAll('.delete-form').forEach(form => {
            form.addEventListener('submit', e => {
                if (!confirm('Are you sure you want to delete this?')) e.preventDefault();
            });
        });

        // Mobile sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('open');
        }
        document.querySelectorAll('.nav-item').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('open');
                document.querySelector('.sidebar-overlay').classList.remove('open');
            });
        });

        // Service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
        }

        // Voice dictation
        function startVoiceInput(targetId) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { alert('Voice input not supported in this browser.'); return; }
            const recognition = new SR();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            const btn = document.querySelector(`[data-voice-target="${targetId}"]`);
            btn.classList.add('listening');
            recognition.onresult = (e) => {
                const t = document.getElementById(targetId);
                const text = e.results[0][0].transcript;
                t.value = t.tagName === 'TEXTAREA' ? (t.value ? t.value + ' ' + text : text) : text;
                btn.classList.remove('listening');
            };
            recognition.onerror = () => btn.classList.remove('listening');
            recognition.onend = () => btn.classList.remove('listening');
            recognition.start();
        }

        // Share task
        function shareTask(title, description) {
            const text = description ? `${title}\n${description}` : title;
            if (navigator.share) {
                navigator.share({ title: 'THIS WEEK', text }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    const t = document.createElement('div');
                    t.className = 'copy-toast';
                    t.textContent = 'Copied to clipboard!';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2000);
                });
            }
        }

        // Slide-out panel
        function openTaskPanel(taskId) {
            fetch(`/api/task/${taskId}`)
                .then(r => r.json())
                .then(task => {
                    const body = document.getElementById('panel-body');
                    let html = `
                        <div class="panel-title">${task.title}</div>
                        ${task.description ? `<div class="panel-desc">${task.description}</div>` : ''}
                        <div class="panel-meta-grid">
                            <div class="panel-meta-item">
                                <span class="panel-label">Status</span>
                                <span class="panel-value status-badge status-${task.status}">${task.status.replace('_', ' ')}</span>
                            </div>
                            <div class="panel-meta-item">
                                <span class="panel-label">Priority</span>
                                <span class="panel-value priority-tag priority-${task.priority}">${task.priority}</span>
                            </div>
                            ${task.due_date_display ? `<div class="panel-meta-item">
                                <span class="panel-label">Due Date</span>
                                <span class="panel-value ${task.is_overdue ? 'overdue' : ''}">${task.due_date_display}</span>
                            </div>` : ''}
                            ${task.category ? `<div class="panel-meta-item">
                                <span class="panel-label">Category</span>
                                <span class="panel-value category-tag">${task.category}</span>
                            </div>` : ''}
                            ${task.collaborator_email ? `<div class="panel-meta-item">
                                <span class="panel-label">Shared with</span>
                                <span class="panel-value collab-tag">${task.collaborator_email}</span>
                            </div>` : ''}
                        </div>`;
                    if (task.action_items.length > 0) {
                        html += `<div class="panel-section">
                            <span class="panel-label">Action Items</span>
                            <div class="panel-progress-bar"><div class="panel-progress-fill" style="width:${task.action_items_percent}%"></div></div>
                            <span class="panel-progress-text">${task.action_items_progress} completed</span>
                            <ul class="panel-checklist">`;
                        task.action_items.forEach(ai => {
                            html += `<li class="${ai.completed ? 'checked' : ''}">${ai.completed ? '&#10003; ' : '&#9634; '}${ai.text}</li>`;
                        });
                        html += `</ul></div>`;
                    }
                    html += `<div class="panel-actions">
                        <a href="/edit/${task.id}" class="btn btn-primary">Edit Task</a>
                    </div>`;
                    body.innerHTML = html;
                    document.getElementById('detail-panel').classList.add('open');
                    document.querySelector('.panel-overlay').classList.add('open');
                });
        }

        function closePanel() {
            document.getElementById('detail-panel').classList.remove('open');
            document.querySelector('.panel-overlay').classList.remove('open');
        }

        // Browser notifications
        function requestNotifications() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        requestNotifications();

        // Check for due-today tasks and notify
        function checkDueNotifications() {
            if ('Notification' in window && Notification.permission === 'granted') {
                fetch('/api/notifications')
                    .then(r => r.json())
                    .then(data => {
                        if (data.due_today > 0) {
                            new Notification('THIS WEEK', {
                                body: `You have ${data.due_today} task${data.due_today > 1 ? 's' : ''} due today!`,
                                icon: '/static/icon-192.png'
                            });
                        }
                        if (data.overdue > 0) {
                            new Notification('THIS WEEK', {
                                body: `${data.overdue} task${data.overdue > 1 ? 's are' : ' is'} overdue!`,
                                icon: '/static/icon-192.png'
                            });
                        }
                    }).catch(() => {});
            }
        }
        // Check once on load, then every 30 minutes
        setTimeout(checkDueNotifications, 3000);
        setInterval(checkDueNotifications, 30 * 60 * 1000);
    </script>
</body>
</html>
