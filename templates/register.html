<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Sign Up — THIS WEEK</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="/static/logo.svg" alt="THIS WEEK" width="48" height="48">
                <h1>THIS WEEK</h1>
            </div>
            <h2>Create your account</h2>
            <p class="auth-subtitle">Start organizing your week</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="auth-error">{{ messages[0] }}</div>
            {% endif %}
            {% endwith %}

            <form method="post" class="auth-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
</body>
</html>
